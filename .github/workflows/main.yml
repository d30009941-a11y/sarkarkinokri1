name: Recruitment Portal Update

on:
  push:
    paths:
      - 'notification/**' # Triggers when you upload a new PDF
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  update-portal:
    runs-on: ubuntu-latest
    # Added permissions to ensure the bot can push the generated JSONs
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-genai pdfplumber python-dotenv

      - name: Run Auto Pipeline
        env:
          # Mapping the GitHub Secrets to the Environment Variables your script expects
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: python scripts/auto_pipeline.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Portal-Bot"
          git config --global user.email "bot@yourdomain.com"
          
          # This command captures new Master JSONs and the new Event JSONs
          # regardless of whether the folders were just created
          git add data/
          
          # The "|| echo" prevents the pipeline from failing if there are no new updates
          git commit -m "auto: update jobs and event timelines [skip ci]" || echo "No changes to commit"
          git push
