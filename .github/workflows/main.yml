name: Recruitment Portal Update

on:
  push:
    paths:
      - 'notification/**'
  workflow_dispatch:

jobs:
  update-portal:
    runs-on: ubuntu-latest
    # INCREASED TIMEOUT: AI rotation with 15s sleeps needs more than 15 mins for many PDFs
    timeout-minutes: 60 

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install google-genai pdfplumber python-dotenv

      - name: Run Auto Pipeline
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        # Run from the root so scripts find /notification and /data
        run: python scripts/auto_pipeline.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Portal-Bot"
          git config --global user.email "bot@yourdomain.com"
          
          # Stage all changes in the data directory
          git add data/
          
          # [skip ci] is mandatory to prevent the bot from triggering itself
          git commit -m "auto: portal sync $(date +'%Y-%m-%d') [skip ci]" || echo "No changes to commit"
          git push
