name: Recruitment Portal Update

on:
  push:
    paths:
      - 'notification/**'        # Trigger only if new PDFs are added
  workflow_dispatch:            # Allows manual trigger

jobs:
  update-portal:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3️⃣ Install Dependencies
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install google-genai>=0.3.0 pdfplumber python-dotenv

      # 4️⃣ Run Auto Pipeline
      - name: Run Auto Pipeline
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: python scripts/auto_pipeline.py

      # 5️⃣ Commit and Push Generated JSONs
      - name: Commit and Push Changes
        run: |
          git config --global user.name "Portal-Bot"
          git config --global user.email "bot@yourdomain.com"
          git add data/jobsdata/*.json data/events/*.json
          git commit -m "auto: update jobs and events timeline [skip ci]" || echo "No changes to commit"
          git push