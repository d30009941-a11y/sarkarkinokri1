name: Recruitment Portal Update

on:
  push:
    paths:
      - 'notification/**'
  workflow_dispatch:

jobs:
  update-portal:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Increased for rate-limit delays

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install google-genai pdfplumber python-dotenv
          # Or pip install -r requirements.txt if file exists

      - name: Run Auto Pipeline
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: python scripts/auto_pipeline.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Portal-Bot"
          git config --global user.email "bot@yourdomain.com"
          
          # Fix: Added -A and pointed to the parent data folder
          git add -A data/ 
          
          # Added [skip ci] to prevent infinite loops
          git commit -m "auto: update jobs and events [skip ci]" || echo "No changes to commit"
          git push
