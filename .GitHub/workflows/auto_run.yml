name: Sarkar Automation Engine
on:
  push:
    paths:
      - 'notification/**.pdf' # Path updated to match your folder
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  process-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-generativeai

      - name: Run Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Yahan GitHub secret use ho raha hai
        run: |
          for f in notification/*.pdf; do
            if [ -f "$f" ]; then
              python scripts/process_pdf.py "$f"
              mkdir -p notification/archive
              mv "$f" notification/archive/
            fi
          done
          python scripts/status_refresher.py

      - name: Commit and Push
        run: |
          git config --global user.name "Sarkar-Bot"
          git config --global user.email "bot@sarkarkinokri.com"
          git add .
          git commit -m "Auto-Update: Job Feed and Status [skip ci]" || exit 0
          git push
